description: >-
  FinOps view of Langtrace spend. Langtrace is dual-distributed: a free,
  self-hosted open-source build (AGPL-3.0) where the only cost is the
  operator's own infrastructure, and Langtrace Cloud, billed on a span-metered
  SaaS model with a Free tier, a per-seat Growth tier, and a sales-led
  Enterprise tier. The primary Cloud cost driver is ingested span volume; seat
  count drives Growth subscription cost.
notes: >-
  Cloud tiers, span allowances, and seat pricing are not reconciled; verify
  against the Langtrace pricing page during reconciliation. Self-hosted has no
  software license cost.
sources:
- https://www.langtrace.ai/pricing
- https://docs.langtrace.ai/introduction
- https://github.com/Scale3-Labs/langtrace
